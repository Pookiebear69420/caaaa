<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ProCam Elite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --accent: #facc15; /* Professional Yellow */
            --safe-top: env(safe-area-inset-top, 20px);
            --safe-bottom: env(safe-area-inset-bottom, 20px);
        }
        body {
            background: #000;
            color: #fff;
            font-family: 'Inter', -apple-system, sans-serif;
            overflow: hidden;
            height: 100vh;
            user-select: none;
        }
        
        /* Viewfinder Overlay */
        .grid-overlay {
            position: absolute;
            inset: 0;
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            grid-template-rows: 1fr 1fr 1fr;
            pointer-events: none;
            opacity: 0.3;
        }
        .grid-line-v { border-right: 1px solid white; }
        .grid-line-h { border-bottom: 1px solid white; }

        /* Leveler */
        #horizon {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 60%;
            height: 2px;
            background: rgba(255,255,255,0.5);
            transform: translate(-50%, -50%);
            pointer-events: none;
        }

        /* Zoom Rocker */
        .zoom-slider {
            -webkit-appearance: none;
            width: 180px;
            height: 40px;
            background: transparent;
            transform: rotate(-90deg);
            position: absolute;
            right: -60px;
            top: 50%;
            margin-top: -90px;
            z-index: 40;
        }
        .zoom-slider::-webkit-slider-runnable-track {
            height: 2px;
            background: rgba(255,255,255,0.3);
        }
        .zoom-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px;
            height: 30px;
            background: white;
            border-radius: 2px;
            margin-top: -14px;
            border: 1px solid black;
        }

        /* Smooth Panels */
        .panel-slide {
            transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1), opacity 0.3s;
        }
        .off-screen { transform: translateY(100%); opacity: 0; }
        
        #viewfinder {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .active-tab { color: var(--accent) !important; border-bottom: 2px solid var(--accent); }
        .shutter-inner { transition: transform 0.1s; }
        .shutter-inner:active { transform: scale(0.85); }
    </style>
</head>
<body>

    <div class="relative w-full h-full flex flex-col overflow-hidden">
        
        <div class="absolute top-0 left-0 w-full z-40 px-6 pt-[var(--safe-top)] flex justify-between items-center bg-gradient-to-b from-black/80 to-transparent">
            <div class="flex gap-4 items-center">
                <button id="toggle-flash" class="w-10 h-10 flex items-center justify-center"><i class="fa-solid fa-bolt-slash"></i></button>
                <button id="toggle-grid" class="w-10 h-10 flex items-center justify-center opacity-50"><i class="fa-solid fa-table-cells"></i></button>
            </div>
            
            <div id="long-exp-tag" class="hidden bg-yellow-400 text-black text-[10px] font-black px-2 py-0.5 rounded">LONG EXP</div>
            
            <button id="switch-cam" class="w-10 h-10 flex items-center justify-center bg-white/10 rounded-full backdrop-blur-md">
                <i class="fa-solid fa-camera-rotate"></i>
            </button>
        </div>

        <div class="flex-grow relative bg-zinc-900">
            <video id="viewfinder" autoplay playsinline muted></video>
            
            <div id="grid-system" class="grid-overlay hidden">
                <div class="grid-line-v grid-line-h"></div><div class="grid-line-v grid-line-h"></div><div class="grid-line-h"></div>
                <div class="grid-line-v grid-line-h"></div><div class="grid-line-v grid-line-h"></div><div class="grid-line-h"></div>
                <div class="grid-line-v"></div><div class="grid-line-v"></div><div></div>
            </div>
            
            <div id="horizon" class="hidden"></div>
            
            <input type="range" id="zoom-rocker" min="1" max="5" step="0.1" value="1" class="zoom-slider">
            
            <div id="flash-bg" class="absolute inset-0 bg-white opacity-0 pointer-events-none z-50 transition-opacity"></div>
        </div>

        <div class="bg-black/95 px-6 pb-[var(--safe-bottom)] pt-4 z-40">
            <div class="flex justify-around text-[10px] font-bold tracking-widest text-zinc-500 mb-6 uppercase">
                <button onclick="setMode('photo')" id="mode-photo" class="active-tab px-2 pb-1">Photo</button>
                <button onclick="setMode('le')" id="mode-le" class="px-2 pb-1">Long Exp</button>
                <button onclick="togglePanel('manual')" class="px-2 pb-1">Manual</button>
                <button onclick="togglePanel('lab')" class="px-2 pb-1">Filter Lab</button>
            </div>

            <div class="flex justify-between items-center">
                <button id="gallery-btn" class="w-12 h-12 bg-zinc-800 rounded-full overflow-hidden border border-white/20">
                    <img id="last-img" class="w-full h-full object-cover hidden">
                </button>

                <button id="shutter-btn" class="relative group">
                    <div class="w-20 h-20 rounded-full border-[6px] border-white flex items-center justify-center">
                        <div class="shutter-inner w-14 h-14 bg-white rounded-full"></div>
                    </div>
                </button>

                <button onclick="togglePanel('filters')" class="w-12 h-12 flex items-center justify-center text-xl">
                    <i class="fa-solid fa-wand-magic-sparkles"></i>
                </button>
            </div>
        </div>
    </div>

    <div id="panel-manual" class="fixed bottom-0 left-0 w-full bg-zinc-900/95 backdrop-blur-xl p-8 panel-slide off-screen z-[60] rounded-t-3xl border-t border-white/10">
        <div class="flex justify-between items-center mb-8">
            <h3 class="text-xs font-black uppercase tracking-widest text-zinc-500">Settings</h3>
            <button onclick="togglePanel('manual')"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div class="space-y-8">
            <div class="space-y-2">
                <div class="flex justify-between text-[10px]"><span>ISO Sensitivity</span><span id="v-iso">400</span></div>
                <input type="range" id="s-iso" min="100" max="3200" value="400" class="w-full accent-yellow-400 h-1 bg-zinc-800 rounded-lg appearance-none">
            </div>
            <div class="space-y-2">
                <div class="flex justify-between text-[10px]"><span>Shutter Speed</span><span id="v-ss">1/125</span></div>
                <input type="range" id="s-ss" min="1" max="1000" value="125" class="w-full accent-yellow-400 h-1 bg-zinc-800 rounded-lg appearance-none">
            </div>
            <div class="flex items-center justify-between pt-4 border-t border-white/5">
                <span class="text-[10px] uppercase">Leveling Guide</span>
                <input type="checkbox" id="level-toggle" class="w-4 h-4">
            </div>
        </div>
    </div>

    <div id="gallery-layer" class="fixed inset-0 bg-black z-[100] panel-slide off-screen flex flex-col">
        <div class="pt-[var(--safe-top)] px-6 py-6 flex justify-between items-center border-b border-white/5">
            <h2 class="text-sm font-black tracking-tighter italic">GALLERY_INDEX</h2>
            <button onclick="closeGallery()" class="text-xs uppercase font-bold text-yellow-400">Back</button>
        </div>
        <div id="gallery-grid" class="flex-grow overflow-y-auto grid grid-cols-3 gap-0.5 p-0.5"></div>
    </div>

<script>
    let db;
    let stream;
    let mode = 'photo';
    let currentFilter = 'none';
    let currentFacing = 'environment';
    let zoomLevel = 1;

    // 1. IndexedDB Setup
    const initStorage = () => {
        const req = indexedDB.open('ProCamMax', 1);
        req.onupgradeneeded = (e) => e.target.result.createObjectStore('photos', { keyPath: 'id', autoIncrement: true });
        req.onsuccess = (e) => { db = e.target.result; loadLastThumb(); };
    };

    // 2. Camera Engine
    const startCam = async () => {
        if (stream) stream.getTracks().forEach(t => t.stop());
        try {
            stream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: currentFacing, width: { ideal: 4096 }, height: { ideal: 2160 } }
            });
            const video = document.getElementById('viewfinder');
            video.srcObject = stream;
            
            // Mirror front cam
            video.style.transform = currentFacing === 'user' ? 'scaleX(-1)' : 'scaleX(1)';
            
            // Handle Zoom Support
            const [track] = stream.getVideoTracks();
            const caps = track.getCapabilities();
            const rocker = document.getElementById('zoom-rocker');
            if (caps.zoom) {
                rocker.min = caps.zoom.min;
                rocker.max = caps.zoom.max;
                rocker.step = caps.zoom.step;
            }
        } catch (e) { alert("Camera access required."); }
    };

    // 3. UI Interactions
    function togglePanel(id) {
        const el = document.getElementById(`panel-${id}`);
        if(el) el.classList.toggle('off-screen');
    }

    function setMode(m) {
        mode = m;
        document.getElementById('mode-photo').classList.toggle('active-tab', m === 'photo');
        document.getElementById('mode-le').classList.toggle('active-tab', m === 'le');
        document.getElementById('long-exp-tag').classList.toggle('hidden', m !== 'le');
    }

    document.getElementById('switch-cam').onclick = () => {
        currentFacing = currentFacing === 'user' ? 'environment' : 'user';
        startCam();
    };

    document.getElementById('toggle-grid').onclick = function() {
        const grid = document.getElementById('grid-system');
        grid.classList.toggle('hidden');
        this.classList.toggle('opacity-100');
    };

    document.getElementById('level-toggle').onchange = (e) => {
        document.getElementById('horizon').classList.toggle('hidden', !e.target.checked);
    };

    document.getElementById('zoom-rocker').oninput = (e) => {
        const [track] = stream.getVideoTracks();
        if (track.getCapabilities().zoom) {
            track.applyConstraints({ advanced: [{ zoom: e.target.value }] });
        }
    };

    // 4. Capture & Save
    document.getElementById('shutter-btn').onclick = async () => {
        const flash = document.getElementById('flash-bg');
        flash.style.opacity = '1';
        setTimeout(() => flash.style.opacity = '0', 100);

        const video = document.getElementById('viewfinder');
        const canvas = document.createElement('canvas');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        const ctx = canvas.getContext('2d');

        if(currentFacing === 'user') {
            ctx.translate(canvas.width, 0);
            ctx.scale(-1, 1);
        }

        if (mode === 'le') {
            // Blend 20 frames for 1s long exposure
            ctx.globalAlpha = 0.05;
            for(let i=0; i<20; i++){
                ctx.drawImage(video, 0, 0);
                await new Promise(r => setTimeout(r, 50));
            }
        } else {
            ctx.drawImage(video, 0, 0);
        }

        canvas.toBlob((blob) => {
            const tx = db.transaction('photos', 'readwrite');
            tx.objectStore('photos').add({
                data: blob,
                ts: Date.now(),
                meta: { iso: document.getElementById('s-iso').value, ss: document.getElementById('s-ss').value }
            });
            loadLastThumb();
        }, 'image/jpeg', 0.95);
    };

    // 5. Gallery Engine
    const loadLastThumb = () => {
        const tx = db.transaction('photos', 'readonly');
        const req = tx.objectStore('photos').getAll();
        req.onsuccess = () => {
            const list = req.result;
            if(list.length > 0) {
                const last = list[list.length - 1];
                const thumb = document.getElementById('last-img');
                thumb.src = URL.createObjectURL(last.data);
                thumb.classList.remove('hidden');
            }
        };
    };

    document.getElementById('gallery-btn').onclick = () => {
        const grid = document.getElementById('gallery-grid');
        grid.innerHTML = '';
        const tx = db.transaction('photos', 'readonly');
        tx.objectStore('photos').getAll().onsuccess = (e) => {
            e.target.result.reverse().forEach(p => {
                const img = document.createElement('img');
                img.src = URL.createObjectURL(p.data);
                img.className = 'aspect-square object-cover w-full active:opacity-50 transition';
                img.onclick = () => download(p);
                grid.appendChild(img);
            });
        };
        document.getElementById('gallery-layer').classList.remove('off-screen');
    };

    function closeGallery() { document.getElementById('gallery-layer').classList.add('off-screen'); }

    function download(p) {
        const a = document.createElement('a');
        a.href = URL.createObjectURL(p.data);
        a.download = `IMG_${p.ts}.heic`;
        a.click();
    }

    // Init
    window.onload = () => {
        initStorage();
        startCam();
    };

    // Horizon Level Logic
    window.addEventListener('deviceorientation', (e) => {
        const horizon = document.getElementById('horizon');
        if (horizon) {
            horizon.style.transform = `translate(-50%, -50%) rotate(${e.gamma}deg)`;
            horizon.style.background = Math.abs(e.gamma) < 2 ? 'var(--accent)' : 'white';
        }
    });
</script>
</body>
</html>

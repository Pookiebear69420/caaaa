<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>RetroCam</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap');
        
        :root {
            --ui-accent: #ffb703;
            --ui-bg: #121212;
            --safe-bottom: env(safe-area-inset-bottom, 20px);
            --safe-top: env(safe-area-inset-top, 40px);
        }

        body {
            font-family: 'Space Mono', monospace;
            background-color: #000;
            color: white;
            overflow: hidden;
            touch-action: none;
            -webkit-user-select: none;
            user-select: none;
        }

        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }
        input[type=range]:focus { outline: none; }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 4px;
            cursor: pointer;
            background: rgba(255,255,255,0.2);
            border-radius: 2px;
        }
        input[type=range]::-webkit-slider-thumb {
            height: 20px;
            width: 20px;
            border-radius: 50%;
            background: var(--ui-accent);
            cursor: pointer;
            -webkit-appearance: none;
            margin-top: -8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }

        @keyframes flashAnim {
            0% { opacity: 0; }
            10% { opacity: 1; }
            100% { opacity: 0; }
        }
        .flash-active {
            animation: flashAnim 0.6s ease-out forwards;
        }

        #viewfinder {
            object-fit: cover;
            width: 100%;
            height: 100%;
            transform: scale(var(--cam-zoom, 1.01));
            transition: transform 0.1s ease-out, filter 0.3s ease;
            will-change: filter, transform;
        }

        .vignette-overlay {
            box-shadow: inset 0 0 120px rgba(0,0,0,0.9);
            pointer-events: none;
            opacity: 0.3;
        }
        
        /* High-Frequency Static Grain */
        .grain-overlay {
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.5'/%3E%3C/svg%3E");
            mix-blend-mode: overlay;
            pointer-events: none;
            opacity: 0;
            z-index: 5;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .panel { transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1); will-change: transform; }
        .panel-hidden { transform: translateY(100%); }

        .filter-btn { transition: all 0.2s; }
        .filter-btn.active { border-color: var(--ui-accent); color: var(--ui-accent); transform: scale(1.05); }

        .spinner {
            border: 3px solid rgba(255,255,255,0.1);
            border-radius: 50%;
            border-top: 3px solid var(--ui-accent);
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-black text-white h-screen w-screen relative">

    <div id="app" class="relative w-full h-full flex flex-col">
        <!-- TOP HUD -->
        <div class="absolute top-0 left-0 w-full z-20 flex justify-between items-center px-4 pt-[var(--safe-top)] pb-2 bg-gradient-to-b from-black/80 to-transparent">
            <button onclick="app.toggleManualControls()" class="p-2 text-xl active:scale-90 transition"><i class="fa-solid fa-sliders"></i></button>
            <div class="flex items-center space-x-4">
                <button onclick="app.toggleLongExp()" id="btn-longexp" class="flex items-center space-x-1 text-zinc-400 font-bold text-xs bg-black/50 px-2 py-1 rounded border border-zinc-600 transition">
                    <i class="fa-solid fa-shutter-speed"></i> <span>LONG EXP</span>
                </button>
                <div class="flex items-center space-x-1 text-yellow-400 font-bold text-xs bg-black/50 px-2 py-1 rounded-full border border-yellow-400/30">
                    <i class="fa-solid fa-bolt"></i> <span>FLASH ON</span>
                </div>
            </div>
            <button onclick="app.openGallery()" class="p-2 text-xl active:scale-90 transition"><i class="fa-solid fa-images"></i></button>
        </div>

        <!-- VIEWFINDER -->
        <div class="flex-grow relative overflow-hidden bg-zinc-900 z-0">
            <video id="viewfinder" autoplay playsinline muted></video>
            
            <!-- Grain Overlay (Visible Live) -->
            <div id="grain-layer" class="absolute inset-0 grain-overlay transition-opacity duration-300"></div>
            
            <!-- Vignette Overlay (Visible Live) -->
            <div id="vignette-layer" class="absolute inset-0 vignette-overlay transition-opacity duration-300"></div>

            <!-- Manual Settings HUD -->
            <div id="manual-hud" class="absolute top-1/4 left-2 text-[10px] text-white/70 flex flex-col space-y-1 pointer-events-none hidden">
                <div>ISO <span id="hud-iso" class="text-yellow-400">400</span></div>
                <div>SPD <span id="hud-spd" class="text-yellow-400">1/125</span></div>
                <div>APT <span id="hud-apt" class="text-yellow-400">f/2.8</span></div>
            </div>
        </div>

        <!-- MANUAL CONTROLS PANEL -->
        <div id="manual-controls" class="absolute top-[var(--safe-top)] mt-12 left-0 w-full bg-black/80 backdrop-blur-md z-20 p-4 transform -translate-y-full transition-transform duration-300 hidden">
            <div class="space-y-4">
                <div class="flex items-center space-x-4">
                    <span class="w-10 text-xs text-gray-400">ISO</span>
                    <input type="range" id="iso-slider" min="100" max="3200" step="100" value="400" oninput="app.updateManual('iso')">
                    <span class="w-12 text-xs text-right font-mono" id="val-iso">400</span>
                </div>
                <div class="flex items-center space-x-4">
                    <span class="w-10 text-xs text-gray-400">SHUT</span>
                    <input type="range" id="shutter-slider" min="0.5" max="2.0" step="0.1" value="1.0" oninput="app.updateManual('shutter')">
                    <span class="w-12 text-xs text-right font-mono" id="val-shutter">1.0x</span>
                </div>
                <div class="flex items-center space-x-4">
                    <span class="w-10 text-xs text-gray-400">APER</span>
                    <input type="range" id="aperture-slider" min="1.4" max="16" step="0.2" value="2.8" oninput="app.updateManual('aperture')">
                    <span class="w-12 text-xs text-right font-mono" id="val-aperture">f/2.8</span>
                </div>
                <div class="flex items-center space-x-4 pt-2 border-t border-zinc-800">
                    <span class="w-10 text-xs text-gray-400">ZOOM</span>
                    <input type="range" id="zoom-slider" min="1" max="5" step="0.1" value="1.0" oninput="app.updateManual('zoom')">
                    <span class="w-12 text-xs text-right font-mono" id="val-zoom">1.0x</span>
                </div>
            </div>
        </div>

        <!-- BOTTOM CONTROLS -->
        <div class="w-full z-20 bg-black pb-[var(--safe-bottom)] flex flex-col relative border-t border-zinc-800">
            <div class="w-full overflow-x-auto no-scrollbar py-3 px-4 flex items-center space-x-4" id="filter-carousel"></div>

            <div class="flex justify-between items-center px-8 py-4 pb-6">
                <button onclick="app.openFilterEditor()" class="text-zinc-400 hover:text-white flex flex-col items-center justify-center w-12 active:scale-90 transition">
                    <i class="fa-solid fa-wand-magic-sparkles text-xl mb-1"></i>
                    <span class="text-[9px]" id="edit-btn-text">LAB</span>
                </button>

                <button onclick="app.takePhoto()" class="w-20 h-20 rounded-full border-4 border-zinc-500 p-1 active:scale-95 transition group">
                    <div class="w-full h-full bg-white rounded-full group-active:bg-zinc-300 transition shadow-[0_0_15px_rgba(255,255,255,0.3)]"></div>
                </button>

                <button onclick="app.flipCamera()" class="text-zinc-400 hover:text-white flex flex-col items-center justify-center w-12 active:scale-90 transition">
                    <i class="fa-solid fa-camera-rotate text-xl mb-1"></i>
                    <span class="text-[9px]">FLIP</span>
                </button>
            </div>
        </div>
        
        <div id="flash-overlay" class="absolute inset-0 bg-white pointer-events-none opacity-0 z-50"></div>
    </div>

    <!-- MODALS -->
    <div id="processing-overlay" class="absolute inset-0 bg-black/80 z-[100] flex flex-col items-center justify-center hidden">
        <div class="spinner mb-4"></div>
        <p class="text-sm tracking-widest text-zinc-300 animate-pulse uppercase">Processing Film...</p>
    </div>

    <!-- GALLERY SCREEN -->
    <div id="gallery-screen" class="absolute inset-0 bg-black z-40 panel panel-hidden flex flex-col">
        <div class="flex justify-between items-center px-4 pt-[var(--safe-top)] pb-4 border-b border-zinc-800 bg-zinc-900">
            <h1 class="text-lg font-bold tracking-wider uppercase">Photo Roll</h1>
            <button onclick="app.closeGallery()" class="text-zinc-400 p-2"><i class="fa-solid fa-xmark text-2xl"></i></button>
        </div>
        <div id="gallery-grid" class="flex-grow overflow-y-auto p-1 grid grid-cols-3 gap-1 content-start bg-black">
        </div>
    </div>

    <!-- PHOTO DETAIL -->
    <div id="photo-detail-screen" class="absolute inset-0 bg-black z-50 panel panel-hidden flex flex-col">
        <div class="flex justify-between items-center px-4 pt-[var(--safe-top)] pb-4 bg-gradient-to-b from-black/80 to-transparent absolute top-0 w-full z-10">
            <button onclick="app.closePhotoDetail()" class="text-white p-2 drop-shadow-md"><i class="fa-solid fa-chevron-left text-xl"></i></button>
            <button onclick="app.deleteCurrentPhoto()" class="text-red-500 p-2"><i class="fa-solid fa-trash"></i></button>
        </div>
        <div class="flex-grow relative flex items-center justify-center overflow-hidden">
            <img id="detail-img" src="" class="max-w-full max-h-full object-contain">
        </div>
        <div class="w-full bg-black pb-[var(--safe-bottom)] flex justify-around items-center py-4 border-t border-zinc-800">
            <a id="download-btn" class="flex flex-col items-center text-white active:text-[var(--ui-accent)] p-2">
                <i class="fa-solid fa-download text-2xl mb-1"></i>
                <span class="text-xs">SAVE TO DEVICE</span>
            </a>
        </div>
    </div>

    <!-- CUSTOM FILTER EDITOR -->
    <div id="filter-editor-screen" class="absolute inset-0 bg-black z-50 panel panel-hidden flex flex-col">
        <div class="flex justify-between items-center px-4 pt-[var(--safe-top)] pb-4 border-b border-zinc-800 bg-zinc-900 shrink-0">
            <button onclick="app.closeFilterEditor()" class="text-zinc-400 p-2"><i class="fa-solid fa-xmark text-xl"></i></button>
            <h1 class="text-sm font-bold tracking-wider text-[var(--ui-accent)] uppercase">Film Lab</h1>
            <button onclick="app.saveCustomFilter()" class="text-white font-bold p-2 bg-[var(--ui-accent)] text-black rounded px-4 text-sm">Save</button>
        </div>
        <div class="h-1/3 w-full bg-zinc-950 flex items-center justify-center relative overflow-hidden shrink-0 border-b border-zinc-800">
            <canvas id="editor-canvas" class="max-w-full max-h-full object-contain"></canvas>
            <div class="absolute bottom-2 right-2 text-[10px] bg-black/60 px-2 py-1 rounded text-zinc-400">LAB PREVIEW</div>
        </div>
        <div class="flex-grow overflow-y-auto px-4 py-6 bg-zinc-900 pb-[calc(var(--safe-bottom)+20px)]">
            <input type="text" id="custom-filter-name" placeholder="Film Label (e.g. Chrome 200)" class="w-full bg-black border border-zinc-700 rounded p-3 text-white mb-6 focus:border-[var(--ui-accent)] focus:outline-none">
            
            <div class="mb-8">
                <h3 class="text-xs text-zinc-500 mb-3 uppercase font-bold tracking-widest">Base Chemistry</h3>
                <div class="space-y-4">
                    <div class="flex items-center space-x-3">
                        <span class="w-16 text-xs">Grain</span>
                        <input type="range" id="ed-grain" min="0" max="1" step="0.05" value="0.2">
                    </div>
                    <div class="flex items-center space-x-3">
                        <span class="w-16 text-xs">Vignette</span>
                        <input type="range" id="ed-vignette" min="0" max="1" step="0.05" value="0.3">
                    </div>
                    <div class="flex items-center space-x-3">
                        <span class="w-16 text-xs">Bloom</span>
                        <input type="range" id="ed-blur" min="0" max="2" step="0.1" value="0.1">
                    </div>
                    <div class="flex items-center space-x-3">
                        <span class="w-16 text-xs">Sat</span>
                        <input type="range" id="ed-sat" min="0" max="2" step="0.1" value="1">
                    </div>
                </div>
            </div>
        </div>
    </div>

<script>
const DB_NAME = 'RetroCamDB';
const STORE_NAME = 'photos';

class AppDB {
    static init() {
        return new Promise((resolve, reject) => {
            const request = indexedDB.open(DB_NAME, 1);
            request.onupgradeneeded = e => e.target.result.createObjectStore(STORE_NAME, { keyPath: 'id', autoIncrement: true });
            request.onsuccess = e => resolve(e.target.result);
            request.onerror = () => reject();
        });
    }
    static async savePhoto(dataUrl) {
        const db = await this.init();
        const tx = db.transaction(STORE_NAME, 'readwrite');
        tx.objectStore(STORE_NAME).add({ data: dataUrl, timestamp: Date.now() });
    }
    static async getPhotos() {
        const db = await this.init();
        return new Promise(res => {
            const req = db.transaction(STORE_NAME).objectStore(STORE_NAME).getAll();
            req.onsuccess = () => res(req.result.sort((a,b) => b.timestamp - a.timestamp));
        });
    }
    static async deletePhoto(id) {
        const db = await this.init();
        db.transaction(STORE_NAME, 'readwrite').objectStore(STORE_NAME).delete(id);
    }
}

const PRESET_FILTERS = [
    { id: 'kodak', name: 'Portra 400', css: 'contrast(1.1) saturate(1.2) sepia(0.15)', blur: 0.1, grain: 0.2, vignette: 0.3 },
    { id: 'fuji', name: 'Velvia 50', css: 'contrast(1.3) saturate(1.7) hue-rotate(5deg)', blur: 0.0001, grain: 0.1, vignette: 0.2 },
    { id: 'tri-x', name: 'Tri-X B&W', css: 'grayscale(1) contrast(1.5) brightness(0.9)', blur: 0.3, grain: 0.5, vignette: 0.5 },
    { id: 'expired', name: 'Expired', css: 'sepia(0.6) contrast(0.8) brightness(1.1)', blur: 0.6, grain: 0.6, vignette: 0.4 },
    { id: 'dreamy', name: 'Dreamy', css: 'contrast(0.9) saturate(0.8) brightness(1.1)', blur: 1.5, grain: 0.15, vignette: 0.2 },
    { id: 'cine', name: 'Cinema 800', css: 'contrast(1.1) saturate(0.9) sepia(0.25)', blur: 0.1, grain: 0.3, vignette: 0.6 },
    { id: 'gritty', name: 'Grit 1600', css: 'contrast(1.6) brightness(1.1) grayscale(0.2)', blur: 0.8, grain: 0.9, vignette: 0.7 }
];

class RetroCam {
    constructor() {
        this.video = document.getElementById('viewfinder');
        this.facingMode = "environment";
        this.activeFilterId = 'kodak';
        this.customFilters = JSON.parse(localStorage.getItem('rc_customs') || '[]');
        this.settings = { iso: 400, shutter: 1.0, aperture: 2.8, zoom: 1.0 };
        this.isLongExp = false;
        this.isEditorOpen = false;
        this.processCanvas = document.createElement('canvas');
        this.editorCanvas = document.getElementById('editor-canvas');
        this.editorCtx = this.editorCanvas.getContext('2d');
        this.init();
    }

    async init() {
        this.buildFilterList();
        this.renderCarousel();
        this.updateViewfinder();
        await this.startCamera();
    }

    buildFilterList() {
        this.filters = [...PRESET_FILTERS, ...this.customFilters];
    }

    async startCamera() {
        if (this.stream) this.stream.getTracks().forEach(t => t.stop());
        try {
            this.stream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: this.facingMode, width: { ideal: 1920 }, height: { ideal: 1080 } }
            });
            this.video.srcObject = this.stream;
        } catch (e) { console.error("Camera access denied"); }
    }

    flipCamera() { this.facingMode = this.facingMode === "environment" ? "user" : "environment"; this.startCamera(); }

    renderCarousel() {
        const container = document.getElementById('filter-carousel');
        container.innerHTML = '';
        this.filters.forEach(f => {
            const btn = document.createElement('button');
            btn.className = `filter-btn shrink-0 w-20 h-20 rounded-lg border-2 flex flex-col items-center justify-center bg-zinc-900 overflow-hidden relative ${this.activeFilterId === f.id ? 'active' : 'border-zinc-800'}`;
            btn.onclick = () => { this.activeFilterId = f.id; this.renderCarousel(); this.updateViewfinder(); };
            btn.innerHTML = `<span class="text-[9px] font-bold z-10 leading-tight uppercase px-1 text-center">${f.name}</span>`;
            container.appendChild(btn);
        });
    }

    updateViewfinder() {
        const f = this.filters.find(x => x.id === this.activeFilterId);
        if (!f) return;

        // Apply filters directly to video element for REAL live preview
        let baseFilter = f.css || '';
        let blurVal = f.blur || 0.0001;
        let exposure = `brightness(${this.settings.shutter})`;
        
        // Combine into one filter string
        this.video.style.filter = `${baseFilter} blur(${blurVal}px) ${exposure}`;
        
        // Grain Layer Logic
        const grain = document.getElementById('grain-layer');
        const vignette = document.getElementById('vignette-layer');
        
        // Grain scales with filter setting and ISO noise
        const totalGrain = (f.grain || 0) + (this.settings.iso - 100) / 5000;
        grain.style.opacity = Math.min(totalGrain, 0.9);
        
        // Vignette setting
        vignette.style.opacity = (f.vignette || 0.3);
        
        // Zoom
        this.video.style.setProperty('--cam-zoom', this.settings.zoom);
    }

    toggleManualControls() {
        const el = document.getElementById('manual-controls');
        const hud = document.getElementById('manual-hud');
        if (el.classList.contains('hidden')) {
            el.classList.remove('hidden');
            hud.classList.remove('hidden');
            setTimeout(() => el.classList.remove('-translate-y-full'), 10);
        } else {
            el.classList.add('-translate-y-full');
            setTimeout(() => {
                el.classList.add('hidden');
                hud.classList.add('hidden');
            }, 300);
        }
    }

    updateManual(type) {
        const slider = document.getElementById(`${type}-slider`);
        const valDisplay = document.getElementById(`val-${type}`);
        const hudDisplay = document.getElementById(`hud-${type === 'shutter' ? 'spd' : type}`);
        
        if (!slider) return;
        const val = parseFloat(slider.value);
        this.settings[type] = val;

        if (valDisplay) {
            if (type === 'zoom') valDisplay.innerText = `${val.toFixed(1)}x`;
            else if (type === 'aperture') valDisplay.innerText = `f/${val.toFixed(1)}`;
            else if (type === 'shutter') valDisplay.innerText = `${val.toFixed(1)}x`;
            else valDisplay.innerText = val;
        }

        if (hudDisplay) {
            if (type === 'shutter') hudDisplay.innerText = `1/${Math.round(125/val)}`;
            else if (type === 'aperture') hudDisplay.innerText = `f/${val.toFixed(1)}`;
            else hudDisplay.innerText = val;
        }
        
        this.updateViewfinder();
    }

    toggleLongExp() {
        this.isLongExp = !this.isLongExp;
        document.getElementById('btn-longexp').style.color = this.isLongExp ? 'var(--ui-accent)' : '#71717a';
    }

    async takePhoto() {
        document.getElementById('flash-overlay').classList.add('flash-active');
        document.getElementById('processing-overlay').classList.remove('hidden');
        
        setTimeout(async () => {
            const w = this.video.videoWidth, h = this.video.videoHeight;
            this.processCanvas.width = w; this.processCanvas.height = h;
            const ctx = this.processCanvas.getContext('2d');
            
            if (this.facingMode === 'user') { ctx.translate(w,0); ctx.scale(-1,1); }
            
            if (this.isLongExp) await this.runLongExp(ctx, w, h);
            else ctx.drawImage(this.video, 0, 0, w, h);
            
            const f = this.filters.find(x => x.id === this.activeFilterId);
            this.applyFinalEffects(ctx, w, h, f);
            
            await AppDB.savePhoto(this.processCanvas.toDataURL('image/jpeg', 0.9));
            document.getElementById('processing-overlay').classList.add('hidden');
            document.getElementById('flash-overlay').classList.remove('flash-active');
        }, 150);
    }

    async runLongExp(ctx, w, h) {
        const frames = 12;
        const delay = 80;
        for (let i=0; i<frames; i++) {
            ctx.globalAlpha = 1 / (i + 1);
            ctx.drawImage(this.video, 0, 0, w, h);
            await new Promise(r => setTimeout(r, delay));
        }
        ctx.globalAlpha = 1;
    }

    applyFinalEffects(ctx, w, h, f) {
        const exposure = this.settings.shutter;
        const blurVal = f.blur || 0.0001;
        
        ctx.filter = `${f.css || ''} blur(${blurVal}px) brightness(${exposure})`;
        
        const temp = document.createElement('canvas');
        temp.width = w; temp.height = h;
        temp.getContext('2d').drawImage(this.processCanvas, 0, 0);
        ctx.drawImage(temp, 0, 0);
        
        ctx.filter = 'none';

        // Burn-in Vignette
        const grad = ctx.createRadialGradient(w/2, h/2, w*0.3, w/2, h/2, w*0.9);
        grad.addColorStop(0, 'rgba(0,0,0,0)');
        grad.addColorStop(1, `rgba(0,0,0,${f.vignette || 0.3})`);
        ctx.fillStyle = grad; ctx.fillRect(0,0,w,h);
        
        // Manual Grain logic for final export if needed (Canvas native noise)
        if (f.grain > 0) {
            const totalG = (f.grain || 0) + (this.settings.iso - 100) / 5000;
            const grainCount = (w * h) * 0.1 * totalG;
            ctx.fillStyle = "rgba(255,255,255,0.1)";
            for(let i=0; i<grainCount; i++) {
                ctx.fillRect(Math.random()*w, Math.random()*h, 1, 1);
            }
        }
    }

    // GALLERY & EDITOR
    async openGallery() {
        const photos = await AppDB.getPhotos();
        const grid = document.getElementById('gallery-grid');
        grid.innerHTML = '';
        if (photos.length === 0) {
            grid.innerHTML = '<div class="col-span-3 text-center py-20 text-zinc-600 text-sm">No photos in roll.</div>';
        } else {
            photos.forEach(p => {
                const div = document.createElement('div');
                div.className = 'aspect-square bg-zinc-900 overflow-hidden';
                div.innerHTML = `<img src="${p.data}" class="w-full h-full object-cover" onclick='app.openDetail(${JSON.stringify(p).replace(/'/g, "&apos;")})'>`;
                grid.appendChild(div);
            });
        }
        document.getElementById('gallery-screen').classList.remove('panel-hidden');
    }
    closeGallery() { document.getElementById('gallery-screen').classList.add('panel-hidden'); }
    
    openDetail(p) {
        this.currentId = p.id;
        document.getElementById('detail-img').src = p.data;
        document.getElementById('download-btn').href = p.data;
        document.getElementById('download-btn').download = `retro_${Date.now()}.jpg`;
        document.getElementById('photo-detail-screen').classList.remove('panel-hidden');
    }
    closePhotoDetail() { document.getElementById('photo-detail-screen').classList.add('panel-hidden'); }
    async deleteCurrentPhoto() { 
        if(confirm('Discard this photo?')) { 
            await AppDB.deletePhoto(this.currentId); 
            this.closePhotoDetail(); 
            this.openGallery(); 
        } 
    }

    openFilterEditor() {
        this.isEditorOpen = true;
        document.getElementById('filter-editor-screen').classList.remove('panel-hidden');
        this.editorLoop();
    }
    closeFilterEditor() { this.isEditorOpen = false; document.getElementById('filter-editor-screen').classList.add('panel-hidden'); }
    
    editorLoop() {
        if (!this.isEditorOpen) return;
        requestAnimationFrame(() => this.editorLoop());
        const w = this.editorCanvas.width = 400, h = this.editorCanvas.height = 400;
        
        const g = parseFloat(document.getElementById('ed-grain').value);
        const v = parseFloat(document.getElementById('ed-vignette').value);
        const b = parseFloat(document.getElementById('ed-blur').value);
        const s = parseFloat(document.getElementById('ed-sat').value);

        this.editorCtx.filter = `saturate(${s}) blur(${b}px)`;
        this.editorCtx.drawImage(this.video, 0, 0, w, h);
        this.editorCtx.filter = 'none';

        // Vignette Preview
        const grad = this.editorCtx.createRadialGradient(w/2, h/2, w*0.2, w/2, h/2, w*0.8);
        grad.addColorStop(0, 'transparent'); grad.addColorStop(1, `rgba(0,0,0,${v})`);
        this.editorCtx.fillStyle = grad; this.editorCtx.fillRect(0,0,w,h);
        
        // Grain Preview
        this.editorCtx.fillStyle = `rgba(255,255,255,${g * 0.1})`;
        for(let i=0; i<1000 * g; i++) {
            this.editorCtx.fillRect(Math.random()*w, Math.random()*h, 1, 1);
        }
    }

    saveCustomFilter() {
        const name = document.getElementById('custom-filter-name').value || 'My Film';
        const f = {
            id: 'custom_'+Date.now(),
            name: name,
            grain: parseFloat(document.getElementById('ed-grain').value),
            vignette: parseFloat(document.getElementById('ed-vignette').value),
            blur: parseFloat(document.getElementById('ed-blur').value),
            css: `saturate(${document.getElementById('ed-sat').value}) contrast(1.1)`
        };
        this.customFilters.push(f);
        localStorage.setItem('rc_customs', JSON.stringify(this.customFilters));
        this.buildFilterList(); 
        this.renderCarousel(); 
        this.closeFilterEditor();
    }
}

window.onload = () => {
    window.app = new RetroCam();
};
</script>
